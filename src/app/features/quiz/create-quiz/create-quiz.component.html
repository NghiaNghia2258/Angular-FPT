<div class="container">
  <h1 class="mt-3">Add Quiz</h1>
  <form #form="ngForm" (ngSubmit)="onFormSubmit()">
    <!-- Title -->
    <div class="mt-3">
      <label for="quizTitle">Quiz Title</label>
      <input
        type="text"
        id="quizTitle"
        name="quizTitle"
        [(ngModel)]="model.title"
        class="form-control"
        required
      />
    </div>

    <!-- Description -->
    <div class="mt-3">
      <label for="quizDescription">Description</label>
      <textarea
        id="quizDescription"
        name="quizDescription"
        [(ngModel)]="model.description"
        class="form-control"
        rows="3"
        required
      ></textarea>
    </div>

    <!-- Duration -->
    <div class="mt-3">
      <label for="quizDuration">Duration (minutes)</label>
      <input
        type="number"
        id="quizDuration"
        name="quizDuration"
        [(ngModel)]="model.duration"
        class="form-control"
        required
        min="1"
      />
    </div>

    <!-- Subject -->
    <div class="mt-3">
      <label for="quizSubject">Subject</label>
      <select
        id="quizSubject"
        name="quizSubject"
        [(ngModel)]="model.subjectId"
        class="form-control"
        required
      >
        <option *ngFor="let subject of subjects" [value]="subject.id">
          {{ subject.name }}
        </option>
      </select>
    </div>

    <!-- Submit Button -->
    <div class="mt-3">
      <button class="btn btn-primary" type="submit">Submit</button>
    </div>
  </form>
</div>
