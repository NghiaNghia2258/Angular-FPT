<div class="container">
  <h1 class="mt-3">Update Quiz</h1>

  <!-- Form cập nhật quiz -->
  <form (ngSubmit)="onSubmit()" class="mt-4">
    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input
        type="text"
        id="title"
        class="form-control"
        [(ngModel)]="quiz.title"
        name="title"
        required
      />
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea
        id="description"
        class="form-control"
        [(ngModel)]="quiz.description"
        name="description"
        rows="3"
        required
      ></textarea>
    </div>

    <div class="mb-3">
      <label for="duration" class="form-label">Duration (minutes)</label>
      <input
        type="number"
        id="duration"
        class="form-control"
        [(ngModel)]="quiz.duration"
        name="duration"
        required
      />
    </div>

    <div class="mb-3">
      <label for="subject" class="form-label">Subject</label>
      <select
        id="subject"
        class="form-select"
        [(ngModel)]="quiz.subjectId"
        name="subjectId"
        required
      >
        <option *ngFor="let subject of subjects" [value]="subject.id">
          {{ subject.name }}
        </option>
      </select>
    </div>

    <div class="d-flex justify-content-end">
      <button type="submit" class="btn btn-success me-2">Update</button>
      <button type="button" class="btn btn-secondary" (click)="cancelUpdate()">
        Cancel
      </button>
    </div>
  </form>
</div>
