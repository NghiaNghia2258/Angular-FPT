<div class="container">
  <h1 class="mt-3">Quiz List</h1>

  <!-- Nút thêm mới -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <button class="btn btn-primary" (click)="addNewQuiz()">Add New Quiz</button>
  </div>

  <!-- Hiển thị danh sách quiz -->
  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Description</th>
        <th>Duration (minutes)</th>
        <th>Subject</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let quiz of quizzes; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ quiz.title }}</td>
        <td>{{ quiz.description }}</td>
        <td>{{ quiz.duration }}</td>
        <td>{{ quiz.subjectName }}</td>
        <td>
          <button class="btn btn-info btn-sm" (click)="viewQuiz(quiz.id)">
            View
          </button>
          <button class="btn btn-danger btn-sm" (click)="deleteQuiz(quiz.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Thông báo khi danh sách rỗng -->
  <div *ngIf="quizzes.length === 0" class="alert alert-info mt-3">
    No quizzes found.
  </div>
</div>
